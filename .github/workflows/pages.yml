name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build static site payload
        shell: bash
        run: |
          mkdir -p site
          cp README.md index.html install.sh install.ps1 site/

          if [ -f latest.json ]; then
            cp latest.json site/
          fi

          if [ -d manifests ]; then
            mkdir -p site/manifests
            rsync -a --exclude '.gitkeep' manifests/ site/manifests/
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
